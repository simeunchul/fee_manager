# 은행별 거래내역 엑셀 컬럼 매핑
#
# 은행이 다운로드해주는 .xls/.xlsx 파일은 표 헤더가 은행마다 다릅니다.
# 이 파일에서 "내부 표준 컬럼명" → "은행 파일의 실제 컬럼명 후보" 를 정의합니다.
#
# 새 은행 추가:
#   1) 아래에 은행 키 추가 (예: keb, ibk)
#   2) 해당 은행의 컬럼명을 candidates 에 나열 (다중 후보 가능)
#   3) UI > 거래내역 업로드에서 "은행 자동 감지" 가 실패하면 수동 선택
#
# auto_detect_keywords:
#   파일 안 어딘가에 이 키워드 중 하나라도 포함되면 해당 은행으로 추정
#   (시트명/첫 행 텍스트 등에서 검색)

banks:
  kb:
    display_name: KB국민
    auto_detect_keywords: ["KB국민", "국민은행", "KB Star"]
